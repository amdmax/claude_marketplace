name: Validate Skills

on:
  push:
    paths:
      - '.claude/skills/**/SKILL.md'
      - '.claude/plugins/**/SKILL.md'
  pull_request:
    paths:
      - '.claude/skills/**/SKILL.md'
      - '.claude/plugins/**/SKILL.md'

permissions:
  contents: read

jobs:
  validate-changed-skills:
    name: Validate changed skills
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Detect changed SKILL.md files
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE" "$HEAD" -- '.claude/skills/**/SKILL.md' '.claude/plugins/**/SKILL.md' || true)

          if [[ -z "$CHANGED" ]]; then
            echo "No SKILL.md files changed"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changed files:"
            echo "$CHANGED"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            # Write to file to preserve newlines
            echo "$CHANGED" > /tmp/changed-skills.txt
          fi

      - name: Validate changed skills
        if: steps.changed.outputs.has_changes == 'true'
        run: |
          ERRORS=0
          VALID=0
          TOTAL=0

          echo "## Skill Validation" >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r SKILL_FILE; do
            [[ -z "$SKILL_FILE" ]] && continue
            TOTAL=$((TOTAL + 1))

            SKILL_NAME=$(basename "$(dirname "$SKILL_FILE")")/$(basename "$SKILL_FILE")

            echo "::group::Validating $SKILL_FILE"

            # Extract frontmatter
            FRONTMATTER=$(awk 'NR==1 && /^---$/{flag=1; next} flag && /^---$/{exit} flag' "$SKILL_FILE")

            # Check frontmatter exists
            if [[ -z "$FRONTMATTER" ]]; then
              echo "::error file=$SKILL_FILE::Missing frontmatter delimiters (---)"
              echo "- [ ] \`$SKILL_NAME\` ã Missing frontmatter delimiters (---)" >> "$GITHUB_STEP_SUMMARY"
              ERRORS=$((ERRORS + 1))
              echo "::endgroup::"
              continue
            fi

            # Validate YAML syntax
            if ! echo "$FRONTMATTER" | yq eval '.' - >/dev/null 2>&1; then
              echo "::error file=$SKILL_FILE::Invalid YAML syntax in frontmatter"
              echo "- [ ] \`$SKILL_NAME\` ã Invalid YAML syntax in frontmatter" >> "$GITHUB_STEP_SUMMARY"
              ERRORS=$((ERRORS + 1))
              echo "::endgroup::"
              continue
            fi

            FILE_ERRORS=0
            FIRST_ERROR=""

            # Check required fields
            NAME=$(echo "$FRONTMATTER" | yq eval '.name' -)
            if [[ "$NAME" == "null" || -z "$NAME" ]]; then
              echo "::error file=$SKILL_FILE::Required field 'name' not found"
              [[ -z "$FIRST_ERROR" ]] && FIRST_ERROR="Required field 'name' not found"
              FILE_ERRORS=$((FILE_ERRORS + 1))
            fi

            DESCRIPTION=$(echo "$FRONTMATTER" | yq eval '.description' -)
            if [[ "$DESCRIPTION" == "null" || -z "$DESCRIPTION" ]]; then
              echo "::error file=$SKILL_FILE::Required field 'description' not found"
              [[ -z "$FIRST_ERROR" ]] && FIRST_ERROR="Required field 'description' not found"
              FILE_ERRORS=$((FILE_ERRORS + 1))
            fi

            # Validate name format
            if [[ "$NAME" != "null" && ! "$NAME" =~ ^[a-zA-Z0-9:_-]+$ ]]; then
              echo "::error file=$SKILL_FILE::Invalid skill name format: $NAME (use alphanumeric, hyphens, colons, underscores)"
              [[ -z "$FIRST_ERROR" ]] && FIRST_ERROR="Invalid skill name format: $NAME"
              FILE_ERRORS=$((FILE_ERRORS + 1))
            fi

            # Validate hooks if present
            HOOKS=$(echo "$FRONTMATTER" | yq eval '.hooks' -)
            if [[ "$HOOKS" != "null" ]]; then
              VALID_EVENTS="Start Stop PreToolUse PostToolUse Notification SessionStart UserPromptSubmit SubagentStart SubagentStop PreCompact SessionEnd"

              HOOK_EVENTS=$(echo "$FRONTMATTER" | yq eval '.hooks | keys | .[]' -)
              while IFS= read -r EVENT; do
                [[ -z "$EVENT" ]] && continue

                if [[ ! " $VALID_EVENTS " =~ " $EVENT " ]]; then
                  echo "::error file=$SKILL_FILE::Invalid hook event type: '$EVENT' (valid: $VALID_EVENTS)"
                  [[ -z "$FIRST_ERROR" ]] && FIRST_ERROR="Invalid hook event type: '$EVENT'"
                  FILE_ERRORS=$((FILE_ERRORS + 1))
                fi

                # Detect hook format: array (native Claude Code) or map (flat legacy)
                HOOK_TYPE=$(echo "$FRONTMATTER" | yq eval ".hooks.$EVENT | type" -)

                if [[ "$HOOK_TYPE" == "!!map" ]]; then
                  # Flat format: hooks.<EVENT>.command is a direct string
                  COMMAND=$(echo "$FRONTMATTER" | yq eval ".hooks.$EVENT.command" -)
                  if [[ "$COMMAND" == "null" ]]; then
                    echo "::error file=$SKILL_FILE::Hook '$EVENT' missing required field 'command'"
                    [[ -z "$FIRST_ERROR" ]] && FIRST_ERROR="Hook '$EVENT' missing required field 'command'"
                    FILE_ERRORS=$((FILE_ERRORS + 1))
                  fi
                  TIMEOUT=$(echo "$FRONTMATTER" | yq eval ".hooks.$EVENT.timeout" -)
                  if [[ "$TIMEOUT" != "null" ]] && ! [[ "$TIMEOUT" =~ ^[0-9]+$ ]]; then
                    echo "::error file=$SKILL_FILE::Hook '$EVENT' timeout must be a number (milliseconds)"
                    [[ -z "$FIRST_ERROR" ]] && FIRST_ERROR="Hook '$EVENT' timeout must be a number"
                    FILE_ERRORS=$((FILE_ERRORS + 1))
                  fi
                elif [[ "$HOOK_TYPE" == "!!seq" ]]; then
                  # Native Claude Code array format: [{matcher?, hooks: [{type, command|prompt}]}]
                  COUNT=$(echo "$FRONTMATTER" | yq eval ".hooks.$EVENT | length" -)
                  for ((i=0; i<COUNT; i++)); do
                    INNER=$(echo "$FRONTMATTER" | yq eval ".hooks.$EVENT[$i].hooks" -)
                    if [[ "$INNER" == "null" ]]; then
                      echo "::error file=$SKILL_FILE::Hook '$EVENT'[$i] missing 'hooks' array"
                      [[ -z "$FIRST_ERROR" ]] && FIRST_ERROR="Hook '$EVENT'[$i] missing 'hooks' array"
                      FILE_ERRORS=$((FILE_ERRORS + 1))
                      continue
                    fi
                    INNER_COUNT=$(echo "$FRONTMATTER" | yq eval ".hooks.$EVENT[$i].hooks | length" -)
                    for ((j=0; j<INNER_COUNT; j++)); do
                      TYPE=$(echo "$FRONTMATTER" | yq eval ".hooks.$EVENT[$i].hooks[$j].type" -)
                      CMD=$(echo "$FRONTMATTER" | yq eval ".hooks.$EVENT[$i].hooks[$j].command" -)
                      PROMPT=$(echo "$FRONTMATTER" | yq eval ".hooks.$EVENT[$i].hooks[$j].prompt" -)
                      if [[ "$TYPE" == "null" ]]; then
                        echo "::error file=$SKILL_FILE::Hook '$EVENT'[$i].hooks[$j] missing 'type'"
                        [[ -z "$FIRST_ERROR" ]] && FIRST_ERROR="Hook '$EVENT'[$i].hooks[$j] missing 'type'"
                        FILE_ERRORS=$((FILE_ERRORS + 1))
                      fi
                      if [[ "$CMD" == "null" && "$PROMPT" == "null" ]]; then
                        echo "::error file=$SKILL_FILE::Hook '$EVENT'[$i].hooks[$j] missing 'command' or 'prompt'"
                        [[ -z "$FIRST_ERROR" ]] && FIRST_ERROR="Hook '$EVENT'[$i].hooks[$j] missing 'command' or 'prompt'"
                        FILE_ERRORS=$((FILE_ERRORS + 1))
                      fi
                    done
                  done
                fi
              done <<< "$HOOK_EVENTS"
            fi

            if [[ $FILE_ERRORS -eq 0 ]]; then
              echo "ã Valid"
              echo "- [x] \`$SKILL_NAME\`" >> "$GITHUB_STEP_SUMMARY"
              VALID=$((VALID + 1))
            else
              echo "- [ ] \`$SKILL_NAME\` ã $FIRST_ERROR" >> "$GITHUB_STEP_SUMMARY"
              ERRORS=$((ERRORS + 1))
            fi

            echo "::endgroup::"
          done < /tmp/changed-skills.txt

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Skill Validation ã $VALID/$TOTAL passed" >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "ãããããããããããããããããããããããããããããããããã"
          echo "Validation Summary"
          echo "ãããããããããããããããããããããããããããããããããã"
          echo "Total:   $TOTAL"
          echo "Valid:   $VALID"
          echo "Invalid: $ERRORS"
          echo "ãããããããããããããããããããããããããããããããããã"

          if [[ $ERRORS -gt 0 ]]; then
            echo "::error::$ERRORS skill(s) failed validation"
            exit 1
          fi

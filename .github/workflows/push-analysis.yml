name: Push Classification

on:
  push:
    branches: [main]

jobs:
  classify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Classify push by changed paths
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)

          skills=false hooks=false bundles=false docs=false config=false
          skill_names="" hook_names="" bundle_names=""

          while IFS= read -r file; do
            case "$file" in
              .claude/skills/*)
                skills=true
                name=$(echo "$file" | cut -d'/' -f3)
                if [ -n "$name" ] && ! echo "$skill_names" | grep -qw "$name"; then
                  skill_names="${skill_names:+$skill_names, }$name"
                fi
                ;;
              .claude/hooks/*)
                hooks=true
                name=$(echo "$file" | cut -d'/' -f3)
                if [ -n "$name" ] && ! echo "$hook_names" | grep -qw "$name"; then
                  hook_names="${hook_names:+$hook_names, }$name"
                fi
                ;;
              bundles/*)
                bundles=true
                name=$(echo "$file" | cut -d'/' -f2)
                if [ -n "$name" ] && ! echo "$bundle_names" | grep -qw "$name"; then
                  bundle_names="${bundle_names:+$bundle_names, }$name"
                fi
                ;;
              README.md|docs/*|*.md)
                docs=true
                ;;
              .github/*|scripts/*|*.json|*.yaml|*.yml)
                config=true
                ;;
            esac
          done <<< "$changed"

          # Build classification
          types=""
          if $skills; then types="${types:+$types+}skill"; fi
          if $hooks; then types="${types:+$types+}hook"; fi
          if $bundles; then types="${types:+$types+}bundle"; fi
          if $docs; then types="${types:+$types+}docs"; fi
          if $config; then types="${types:+$types+}config"; fi
          types="${types:-unknown}"

          # Build affects list
          affects=""
          if [ -n "$skill_names" ]; then affects="${affects:+$affects; }skills: $skill_names"; fi
          if [ -n "$hook_names" ]; then affects="${affects:+$affects; }hooks: $hook_names"; fi
          if [ -n "$bundle_names" ]; then affects="${affects:+$affects; }bundles: $bundle_names"; fi
          affects="${affects:-general}"

          description="Type: $types. Affects: $affects"
          # Truncate to 140 chars for commit status
          description="${description:0:140}"

          echo "Classification: $description"

          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            -f state=success \
            -f context="push/classification" \
            -f description="$description"

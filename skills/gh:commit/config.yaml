# Commit Skill Configuration
# Generated by refactor-skill

# Commit numbering convention
numbering:
  # Numbering mode: "issue-based" uses GitHub issue numbers, "sequential" uses incremental counter
  mode: "issue-based"  # Options: "issue-based" | "sequential"

  # Prefix for all commits (project requirement: must be AIGCODE)
  prefix: AIGCODE

  # Issue-based settings (use GitHub issue numbers from active story)
  issue:
    # Path to active story file (relative to project root)
    source: ".agile-dev-team/active-story.json"
    # JSON field containing issue number
    field: "issueNumber"
    # Format string for issue-based commits (e.g., AIGCODE-157)
    format: "%s-%d"
    # Auto-create issue if no active story exists
    create_if_missing: true

  # Sequential settings (fallback when issue creation fails or mode=sequential)
  sequential:
    # Number of digits for zero-padding
    digits: 3
    # Format string for sequential commits (e.g., AIGCODE-124)
    format: "%s-%03d"

# Grouping detection settings
grouping:
  enabled: true
  time_window: "4 hours ago"
  max_recent_commits: 10
  min_overlap_high: 50    # % file overlap for HIGH confidence
  min_overlap_medium: 30  # % file overlap for MEDIUM confidence
  time_threshold_high: 1  # hours for HIGH confidence
  time_threshold_medium: 4  # hours for MEDIUM confidence
  confidence_threshold: 60  # minimum % to prompt user

# Commit message format
message:
  max_summary_length: 72
  max_line_length: 100
  include_co_author: true
  co_author: "Claude Sonnet 4.5 <noreply@anthropic.com>"

# Git settings
git:
  check_all_branches: true
  verify_staged: true

# Behavior
behavior:
  auto_stage: false  # Don't auto-stage files
  prompt_before_commit: false  # Commit immediately after generating message
  show_diff_summary: true

# Check Story Quality Configuration
# Copy this file to config.yaml and fill in your project values.

repository:
  # GitHub repository slug (owner/repo)
  slug: "myorg/my-repo"
  # Default branch name
  default_branch: "master"

paths:
  # Path to active story JSON file
  active_story_file: ".claude/active-story.json"
  # Path to NFR registry JSON file
  nfr_registry_file: ".claude/nfr-registry.json"

github_project:
  # GitHub Project owner (username or org)
  owner: "myorg"
  # GitHub Project number
  number: 1

# Labels managed by this skill (auto-created if missing)
labels:
  needs_acs: "needs-acs"
  needs_nfrs: "needs-nfrs"
  needs_refinement: "needs-refinement"
  ready_for_dev: "ready-for-development"

# Scheduled workflow settings (optional)
schedule:
  # Workflow file name
  workflow: "story-quality-monitor.yml"
  # Cron expression (default: hourly Mon-Fri)
  cron: "0 * * * 1-5"

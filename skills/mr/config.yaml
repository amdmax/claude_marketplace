# /mr Skill Configuration Template
# This is a TEMPLATE file - copy to your project and replace {{VARIABLES}} with actual values
#
# Quick Setup:
# 1. Copy this skill to your project: cp -r skills/mr/ /your/project/.claude/skills/
# 2. Copy config.example.yaml to config.yaml
# 3. Replace {{VARIABLES}} with your project values

# PR Detection Settings
pr_detection:
  # Check if PR exists and its state (merged, closed, open)
  check_merged: true
  check_closed: true
  # What to do if PR state detection fails
  # Options: "create_new", "update_existing", "ask_user"
  fallback_on_error: "create_new"

# Theme Detection Settings
theme_detection:
  # Enable automatic commit clustering by theme
  enabled: {{THEME_DETECTION_ENABLED}}

  # Minimum commits required to trigger theme detection
  # (Branches with fewer commits skip theme detection)
  min_commits: 2

  # Similarity threshold for grouping commits (0.0 to 1.0)
  # Higher = more strict (commits must be more similar to group)
  # Lower = more lenient (commits can be less similar and still group)
  # Recommended: 0.40 (40% similarity required)
  similarity_threshold: {{SIMILARITY_THRESHOLD}}

  # Weights for similarity calculation (must sum to 1.0)
  weights:
    title_keywords: 0.5   # 50% - Keywords from commit titles
    directories: 0.3      # 30% - File path directories
    categories: 0.2       # 20% - Commit body categories

  # Words to ignore when extracting keywords from commit titles
  stopwords:
    - "the"
    - "a"
    - "an"
    - "and"
    - "or"
    - "for"
    - "to"
    - "in"
    - "on"
    - "with"
    - "add"
    - "update"
    - "fix"
    - "remove"

# Theme Comparison Thresholds (for comparing new commits with existing PR)
theme_comparison:
  # High match - automatically update existing PR
  high_match_threshold: 0.60

  # Low match - automatically create new PR
  low_match_threshold: 0.40

  # Borderline (between thresholds) - ask user for decision

# Branch Naming Configuration
branch_naming:
  # Maximum length for branch names (characters)
  max_length: {{MAX_BRANCH_LENGTH}}

  # Prefix for story-based branches
  story_prefix: "{{STORY_PREFIX}}"

  # Maximum length for story title slug
  story_slug_length: 30

  # Common abbreviations for branch names
  abbreviations:
    dependencies: "deps"
    infrastructure: "infra"
    configuration: "config"
    permissions: "perms"
    documentation: "docs"
    development: "dev"
    production: "prod"

# Conflict Resolution Settings
conflicts:
  # Default strategy for handling cherry-pick conflicts
  # Options: "auto_resolve_simple", "always_ask", "abort_on_conflict"
  default_strategy: "auto_resolve_simple"

  # Available strategies
  strategies:
    - "auto_resolve_simple"   # Auto-resolve one-sided conflicts, ask for complex
    - "always_ask"            # Interactive prompt for every conflict
    - "abort_on_conflict"     # Skip theme on conflict (backward compatible)

# Repository Settings
repository:
  # Default remote name
  default_remote: "{{DEFAULT_REMOTE}}"

  # Default target branch for PRs
  default_branch: "{{DEFAULT_BRANCH}}"

  # Repository slug (owner/repo)
  slug: "{{REPO_SLUG}}"

# PR Creation Settings
pr_creation:
  # Automatically generate PR body from commits
  auto_generate_body: true

  # Include story context in PR if active story exists
  include_story_context: true

  # Include test plan section in PR body
  include_test_plan: true

  # Include impact section in PR body
  include_impact: true

  # Include changes by category section
  include_categories: true

  # PR footer text
  footer: "{{PR_FOOTER}}"

# Story Integration Settings
story_integration:
  # Path to active story file (relative to project root)
  active_story_file: "{{ACTIVE_STORY_FILE}}"

  # Include story number in PR title
  include_story_in_title: true

  # Include story progress section in PR body
  include_story_progress: true

  # Story branch format
  # Available variables: {issue_number}, {slug}
  branch_format: "{{STORY_PREFIX}}-{issue_number}-{slug}"

# Issue Management Settings
issue_management:
  # Automatically prompt for issue closure after PR merge
  auto_prompt_closure: true

  # Comment template when closing issue
  # Available variables: {pr_number}, {pr_numbers} (comma-separated)
  closure_comment: "Completed in PR #{pr_number}"

  # Closure reason
  # Options: "completed", "not_planned"
  closure_reason: "completed"

  # Check for multiple PRs related to story before closing
  check_multiple_prs: true

  # Remove active story file after closing issue (manual cleanup recommended)
  cleanup_story_file: false

# Cherry-Pick Workflow Settings
cherry_pick:
  # Return to default branch before creating theme branches
  checkout_master_first: true

  # Pull latest default branch before creating branches
  pull_master_before_branch: true

  # Sort commits by project prefix number (chronological)
  sort_by_prefix: true

  # Track skipped commits
  track_skipped: true

  # Ask user what to do with original branch after splitting
  prompt_cleanup_original: true

# Advanced Settings
advanced:
  # Verbose output for debugging
  verbose: false

  # Dry run mode (don't push or create PRs)
  dry_run: false

  # Skip theme detection for single commits
  skip_theme_for_single_commit: true

  # Skip theme detection for highly similar commits (>0.7 similarity)
  skip_theme_for_similar_commits: true
  similar_commits_threshold: 0.70
